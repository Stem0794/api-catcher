<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>API Catcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ── Header ────────────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-left">
      <span class="logo">API Catcher</span>
      <span id="entryCount" class="badge">0</span>
      <span id="liveIndicator" class="live-dot" title="Listening for requests"></span>
    </div>
    <div class="header-right">
      <button id="btnToggleRecord" class="toolbar-btn recording" title="Pause recording">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5"/></svg>
        <span class="btn-label" id="recordLabel">Recording</span>
      </button>
      <button id="btnClear" class="toolbar-btn" title="Clear all logs">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4h10M6 4V3h4v1M5 4v8.5a1 1 0 001 1h4a1 1 0 001-1V4"/><line x1="7" y1="7" x2="7" y2="11"/><line x1="9" y1="7" x2="9" y2="11"/></svg>
        <span class="btn-label">Clear</span>
      </button>
      <button id="btnExportAll" class="toolbar-btn" title="Export all as JSON">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 11v2h10v-2"/></svg>
        <span class="btn-label">Export</span>
      </button>
      <button id="btnFullPage" class="toolbar-btn" title="Open as full-page dashboard">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" rx="2"/><polyline points="9,2 9,7 14,7"/></svg>
        <span class="btn-label">Full Page</span>
      </button>
      <button id="btnSettings" class="toolbar-btn" title="Open settings">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
        <span class="btn-label">Settings</span>
      </button>
    </div>
  </header>

  <!-- ── Filter bar ────────────────────────────────────────────────── -->
  <div id="filterBar">
    <input type="text" id="filterInput" placeholder="Filter by URL..." />
    <select id="methodFilter">
      <option value="">All</option>
      <option>GET</option>
      <option>POST</option>
      <option>PUT</option>
      <option>PATCH</option>
      <option>DELETE</option>
    </select>
    <select id="statusFilter">
      <option value="">Status</option>
      <option value="2xx">2xx</option>
      <option value="3xx">3xx</option>
      <option value="4xx">4xx</option>
      <option value="5xx">5xx</option>
      <option value="0">Err</option>
    </select>
  </div>

  <!-- ── Request list ──────────────────────────────────────────────── -->
  <div id="listView">
    <div id="emptyState">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <rect x="4" y="6" width="32" height="28" rx="3"/>
        <line x1="4" y1="14" x2="36" y2="14"/>
        <line x1="12" y1="20" x2="28" y2="20"/>
        <line x1="12" y1="26" x2="24" y2="26"/>
        <line x1="12" y1="32" x2="20" y2="32"/>
      </svg>
      <p>No API calls captured yet</p>
      <p class="hint">Interact with the page to see requests</p>
    </div>
    <ul id="requestList"></ul>
  </div>

  <!-- ── Detail view (shown when a request is selected) ────────────── -->
  <div id="detailView" class="hidden">
    <div id="detailNav">
      <button id="btnBack" class="toolbar-btn" title="Back to list">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg>
        <span class="btn-label">Back</span>
      </button>
      <div id="detailBtns">
        <button id="btnCopyCurl" class="toolbar-btn" title="Copy as cURL command">
          <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="5,3 2,8 5,13"/><polyline points="11,3 14,8 11,13"/></svg>
          <span class="btn-label">cURL</span>
        </button>
        <button id="btnCopyJson" class="toolbar-btn" title="Copy entry as JSON">
          <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2H3.5A1.5 1.5 0 002 3.5v9A1.5 1.5 0 003.5 14h9a1.5 1.5 0 001.5-1.5V11"/><path d="M8 8h6M11 5v6"/></svg>
          <span class="btn-label">JSON</span>
        </button>
        <button id="btnShareGist" class="toolbar-btn btn-accent" title="Create a secret GitHub Gist and copy link">
          <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 10l-2 2M4 12l1 3 3-1M10 6l2-2M12 4l-1-3-3 1"/><path d="M4 8a4 4 0 014-4"/><path d="M12 8a4 4 0 01-4 4"/></svg>
          <span class="btn-label">Share Gist</span>
        </button>
      </div>
    </div>

    <div id="detailSummary">
      <span id="dMethod" class="method-badge">GET</span>
      <span id="dStatus" class="status-pill">200</span>
      <span id="dDuration" class="meta-chip"></span>
      <span id="dType" class="meta-chip"></span>
    </div>
    <div id="dUrl" class="detail-url"></div>
    <div id="dTimestamp" class="detail-timestamp"></div>
    <div id="dInitiator" class="detail-initiator"></div>

    <div class="detail-sections">
      <details class="section">
        <summary>Request Headers</summary>
        <pre id="dReqHeaders"></pre>
      </details>
      <details class="section">
        <summary>Request Body</summary>
        <pre id="dReqBody"></pre>
      </details>
      <details class="section" open>
        <summary>Response Headers</summary>
        <pre id="dResHeaders"></pre>
      </details>
      <details class="section" open>
        <summary>Response Body</summary>
        <pre id="dResBody"></pre>
      </details>
    </div>
  </div>

  <!-- ── Toast ─────────────────────────────────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <script src="sanitizer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
